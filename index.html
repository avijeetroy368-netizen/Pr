<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MISSION</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<div id="loader">

<div class="loaderBox">

<h1>NOVA SECURITY</h1>

<div class="progress">

<div id="bar"></div>

</div>

<p id="percent">0%</p>

</div>

</div>



<section id="terminal">

<div class="scanline"></div>

<div class="noise"></div>

<div class="terminalWindow">

<div class="top">

<div class="dot red"></div>

<div class="dot yellow"></div>

<div class="dot green"></div>

<span>Secure Terminal</span>

</div>

<div id="output"></div>

</div>

</section>



<section id="profile">

<div class="card">

<h2>CLASSIFIED PROFILE</h2>

<div class="line"></div>

<p>Name : <span id="name">********</span></p>

<p>Status : Amazing Human ❤️</p>

<p>Smile : 100%</p>

<p>Kindness : 100%</p>

<p>Respect : 100%</p>

<button id="reveal">
Unlock Message
</button>

</div>

</section>



<div id="message">

<div class="glass">

<h2>Mission Complete</h2>

<p>

Not every beautiful thing can be explained by code.

Some people simply make the world brighter.

😊❤️

</p>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
